apiVersion: apps/v1
kind: Deployment
metadata:
  name: intent-lb-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: intent-lb-app
  template:
    metadata:
      labels:
        app: intent-lb-app
    spec:
      containers:
        - name: nginx
          image: nginx:alpine
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: intent-lb-svc
  annotations:
    metallb.universe.tf/address-pool: m2m-pool
spec:
  type: LoadBalancer
  ipFamilyPolicy: PreferDualStack
  ipFamilies:
    - IPv4
    - IPv6
  selector:
    app: intent-lb-app
  ports:
    - port: 80
      targetPort: 80
