# NetworkAttachmentDefinition for VLAN 590 (mirror VRF)
apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: macvlan-vlan590
spec:
  config: |
    {
      "cniVersion": "0.3.1",
      "type": "macvlan",
      "master": "vlan.590",
      "mode": "bridge",
      "ipam": {
        "type": "static"
      }
    }
