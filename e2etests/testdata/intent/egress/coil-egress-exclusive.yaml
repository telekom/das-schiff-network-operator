# Intent-exclusive egress: Coil Egress + test pod
# Uses distinct namespace to avoid conflicts with coexistence egress test.
apiVersion: coil.cybozu.com/v2
kind: Egress
metadata:
  name: m2m-intent-egress
spec:
  destinations:
    - 10.102.0.0/24
    - fda5:25c1:193c::/64
  replicas: 1
  template:
    metadata:
      annotations:
        cni.projectcalico.org/ipv4pools: '["ob-m2m-base-v4"]'
        cni.projectcalico.org/ipv6pools: '["ob-m2m-base-v6"]'
---
apiVersion: v1
kind: Pod
metadata:
  name: egress-excl-01
  annotations:
    egress.coil.cybozu.com/e2e-test-intent-excl-egress: m2m-intent-egress
spec:
  containers:
    - name: tester
      image: busybox:1.37
      command: ["sleep", "infinity"]
  restartPolicy: Never
