# Base VRFs, Networks, and Destinations for E2E intent tests.
# These mirror the existing e2e network-operator-configs.yaml but using intent CRDs.
apiVersion: network-connector.sylvaproject.org/v1alpha1
kind: VRF
metadata:
  name: vrf-m2m
  namespace: default
spec:
  vrf: "m2m"
  vni: 2002026
  routeTarget: "65188:2026"
---
apiVersion: network-connector.sylvaproject.org/v1alpha1
kind: VRF
metadata:
  name: vrf-c2m
  namespace: default
spec:
  vrf: "c2m"
  vni: 2002027
  routeTarget: "65188:2027"
---
apiVersion: network-connector.sylvaproject.org/v1alpha1
kind: Network
metadata:
  name: net-vlan501
  namespace: default
spec:
  vlan: 501
  vni: 4000002
  ipv4:
    cidr: "10.250.0.0/24"
  ipv6:
    cidr: "fd94:685b:30cf:501::/64"
---
apiVersion: network-connector.sylvaproject.org/v1alpha1
kind: Network
metadata:
  name: net-vlan502
  namespace: default
spec:
  vlan: 502
  vni: 4000003
  ipv4:
    cidr: "10.250.1.0/24"
  ipv6:
    cidr: "fd94:685b:30cf:502::/64"
---
apiVersion: network-connector.sylvaproject.org/v1alpha1
kind: Network
metadata:
  name: net-vlan503
  namespace: default
spec:
  vlan: 503
  vni: 4000004
  ipv4:
    cidr: "10.250.2.0/24"
  ipv6:
    cidr: "fd94:685b:30cf:503::/64"
---
apiVersion: network-connector.sylvaproject.org/v1alpha1
kind: Destination
metadata:
  name: dest-dcgw
  namespace: default
  labels:
    type: gateway
spec:
  vrfRef: "vrf-m2m"
  prefixes:
    - "10.102.0.0/16"
    - "fda5:25c1:193c::/48"
---
apiVersion: network-connector.sylvaproject.org/v1alpha1
kind: Destination
metadata:
  name: dest-dcgw-c2m
  namespace: default
  labels:
    type: gateway-c2m
spec:
  vrfRef: "vrf-c2m"
  prefixes:
    - "10.103.0.0/16"
    - "fda5:25c1:193d::/48"
