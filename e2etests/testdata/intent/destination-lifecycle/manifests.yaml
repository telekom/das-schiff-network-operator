# Unique L2A for lifecycle testing — uses dedicated Network with VLAN 504
# to avoid interference from other tests that may leave L2As for VLANs 501-503.
apiVersion: network-connector.sylvaproject.org/v1alpha1
kind: Network
metadata:
  name: net-vlan504-lifecycle
  namespace: default
spec:
  vlan: 504
  vni: 4000099
  ipv4:
    cidr: "10.250.99.0/24"
---
apiVersion: network-connector.sylvaproject.org/v1alpha1
kind: Layer2Attachment
metadata:
  name: l2a-lifecycle-test
  namespace: default
spec:
  networkRef: "net-vlan504-lifecycle"
  destinations:
    matchLabels:
      type: gateway

