# c2m LoadBalancer test: Deployment + Service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: podinfo-c2m
spec:
  replicas: 2
  selector:
    matchLabels:
      app: podinfo-c2m
  template:
    metadata:
      labels:
        app: podinfo-c2m
    spec:
      containers:
        - name: podinfo
          image: stefanprodan/podinfo:6.7.1
          ports:
            - containerPort: 9898
              name: http
---
apiVersion: v1
kind: Service
metadata:
  name: podinfo-c2m-lb
  annotations:
    metallb.universe.tf/address-pool: c2m-pool
spec:
  type: LoadBalancer
  ipFamilyPolicy: PreferDualStack
  ipFamilies:
    - IPv4
    - IPv6
  ports:
    - port: 80
      targetPort: 9898
      protocol: TCP
  selector:
    app: podinfo-c2m
