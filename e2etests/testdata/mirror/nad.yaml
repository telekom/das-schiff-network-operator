# NetworkAttachmentDefinition for VLAN 590 (mirror VRF) — collector network.
# The mirror-capture (collector) pod attaches here and receives GRE-encapsulated
# mirrored traffic.
apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: macvlan-vlan590
  namespace: e2e-test-mirror
  annotations:
    k8s.v1.cni.cncf.io/resourceName: ""
spec:
  config: |
    {
      "cniVersion": "0.4.0",
      "name": "macvlan-vlan590",
      "plugins": [
        {
          "type": "macvlan",
          "master": "vlan.590",
          "mode": "bridge",
          "ipam": {
            "type": "static",
            "routes": [
              {"dst": "10.250.90.0/24", "gw": "10.250.90.1"}
            ]
          }
        },
        {
          "type": "tuning",
          "sysctl": {
            "net.ipv6.conf.IFNAME.accept_dad": "0"
          }
        }
      ]
    }
