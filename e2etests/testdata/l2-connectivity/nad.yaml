# NetworkAttachmentDefinition for VLAN 501 (m2m VRF)
# Uses CNI conflist to chain macvlan with the tuning meta-plugin.
# The tuning plugin disables IPv6 DAD (Duplicate Address Detection) at
# CNI-chain time, preventing addresses from entering "dadfailed" state
# in containerlab/Kind environments where CRA bridge agents respond to
# DAD probes.
apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: macvlan-vlan501
  namespace: e2e-test
  annotations:
    k8s.v1.cni.cncf.io/resourceName: ""
spec:
  config: |
    {
      "cniVersion": "0.4.0",
      "name": "macvlan-vlan501",
      "plugins": [
        {
          "type": "macvlan",
          "master": "vlan.501",
          "mode": "bridge",
          "ipam": {
            "type": "static",
            "routes": [
              {"dst": "10.250.0.0/16", "gw": "10.250.0.1"},
              {"dst": "10.102.0.0/16", "gw": "10.250.0.1"},
              {"dst": "fd94:685b:30cf::/48", "gw": "fd94:685b:30cf:501::1"},
              {"dst": "fda5:25c1:193c::/48", "gw": "fd94:685b:30cf:501::1"}
            ]
          }
        },
        {
          "type": "tuning",
          "sysctl": {
            "net.ipv6.conf.IFNAME.accept_dad": "0"
          }
        }
      ]
    }
---
