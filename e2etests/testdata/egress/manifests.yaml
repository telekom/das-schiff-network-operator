# Egress NAT test manifests — m2m VRF
#
# IPPools + Coil Egress + test pod. The pools are created and deleted
# together with the rest of the test resources so nothing leaks.
apiVersion: crd.projectcalico.org/v1
kind: IPPool
metadata:
  name: m2m-egress-v4
spec:
  cidr: 10.250.2.0/30
  natOutgoing: false
  blockSize: 32
  nodeSelector: "!all()"
  allowedUses:
    - Workload
---
apiVersion: crd.projectcalico.org/v1
kind: IPPool
metadata:
  name: m2m-egress-v6
spec:
  cidr: fd90:4dbf:396d::/126
  natOutgoing: false
  blockSize: 128
  nodeSelector: "!all()"
  allowedUses:
    - Workload
---
apiVersion: coil.cybozu.com/v2
kind: Egress
metadata:
  name: m2m-egress
  namespace: e2e-test-egress
spec:
  destinations:
    - 10.102.0.0/24
    - fda5:25c1:193c::/64
  replicas: 1
  template:
    metadata:
      annotations:
        cni.projectcalico.org/ipv4pools: '["m2m-egress-v4"]'
        cni.projectcalico.org/ipv6pools: '["m2m-egress-v6"]'
---
apiVersion: v1
kind: Pod
metadata:
  name: egress-via-nat-01
  namespace: e2e-test-egress
  annotations:
    egress.coil.cybozu.com/e2e-test-egress: m2m-egress
spec:
  containers:
    - name: tester
      image: busybox:1.37
      command: ["sleep", "infinity"]
  restartPolicy: Never
