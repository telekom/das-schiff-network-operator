# See https://reuse.software/spec-3.3/#reusetoml for specification
version = 1

# GitHub workflows - CC0-1.0
[[annotations]]
path = [".github/**/*.yml", ".github/**/*.yaml", ".github/**/*.md", ".github/ISSUE_TEMPLATE/**", ".github/CODEOWNERS", "CODEOWNERS"]
precedence = "aggregate"
SPDX-FileCopyrightText = "2026 Deutsche Telekom AG"
SPDX-License-Identifier = "CC0-1.0"

# reuse-compliance.yml carries FSFE copyright in-file; preserve it without adding DT copyright
[[annotations]]
path = [".github/workflows/reuse-compliance.yml"]
precedence = "override"
SPDX-FileCopyrightText = "2022 Free Software Foundation Europe e.V. <https://fsfe.org>"
SPDX-License-Identifier = "CC0-1.0"

# Go source files - Apache-2.0
[[annotations]]
path = [
  "cmd/**/*.go",
  "api/**/*.go",
  "internal/**/*.go",
  "pkg/**/*.go",
  "controllers/**/*.go",
]
precedence = "aggregate"
SPDX-FileCopyrightText = "2026 Deutsche Telekom AG"
SPDX-License-Identifier = "Apache-2.0"

# Configuration files - CC0-1.0
[[annotations]]
path = [
  ".dockerignore",
  ".editorconfig",
  ".gitignore",
  ".golangci.yml",
  ".yamllint.yml",
  "*.Dockerfile",
  "Makefile",
  "PROJECT",
  "versions.env",
  "**/go.mod",
  "**/go.sum",
  "REUSE.toml",
]
precedence = "aggregate"
SPDX-FileCopyrightText = "2026 Deutsche Telekom AG"
SPDX-License-Identifier = "CC0-1.0"

# e2e/setup Go module files - CC0-1.0 (override to avoid Apache-2.0 overlap from e2e/**)
[[annotations]]
path = ["e2e/setup/go.mod", "e2e/setup/go.sum"]
precedence = "override"
SPDX-FileCopyrightText = "2026 Deutsche Telekom AG"
SPDX-License-Identifier = "CC0-1.0"

# Kubernetes configuration - Apache-2.0
[[annotations]]
path = [
  "config/**/*.yaml",
  "config/**/*.yml",
  "config/**/*.tpl",
]
precedence = "aggregate"
SPDX-FileCopyrightText = "2026 Deutsche Telekom AG"
SPDX-License-Identifier = "Apache-2.0"

# Docker support files - CC0-1.0
[[annotations]]
path = ["docker/**"]
precedence = "aggregate"
SPDX-FileCopyrightText = "2026 Deutsche Telekom AG"
SPDX-License-Identifier = "CC0-1.0"

# Documentation - CC0-1.0
[[annotations]]
path = [
  "README.md",
  "CONTRIBUTING.md",
  "CODE_OF_CONDUCT.md",
  "docs/**",
]
precedence = "aggregate"
SPDX-FileCopyrightText = "2026 Deutsche Telekom AG"
SPDX-License-Identifier = "CC0-1.0"

# NOTICE file - Apache-2.0 (describes Apache-2.0 licensed project)
[[annotations]]
path = ["NOTICE"]
precedence = "aggregate"
SPDX-FileCopyrightText = "2026 Deutsche Telekom AG"
SPDX-License-Identifier = "Apache-2.0"

# Hack scripts - Apache-2.0
[[annotations]]
path = ["hack/**"]
precedence = "aggregate"
SPDX-FileCopyrightText = "2026 Deutsche Telekom AG"
SPDX-License-Identifier = "Apache-2.0"

# hack/version.sh - upstream from Kubernetes (different copyright holder)
[[annotations]]
path = ["hack/version.sh"]
precedence = "override"
SPDX-FileCopyrightText = "2020 The Kubernetes Authors"
SPDX-License-Identifier = "Apache-2.0"

# Test fixtures and data - CC0-1.0
[[annotations]]
path = [
  "pkg/**/testdata/**",
  "pkg/**/*_test.xml",
]
precedence = "aggregate"
SPDX-FileCopyrightText = "2026 Deutsche Telekom AG"
SPDX-License-Identifier = "CC0-1.0"

# Generated / vendor files - CC0-1.0
[[annotations]]
path = ["bin/**", "coverage.out", "coverage_hc.out"]
precedence = "aggregate"
SPDX-FileCopyrightText = "2026 Deutsche Telekom AG"
SPDX-License-Identifier = "CC0-1.0"

# e2e test infrastructure - Apache-2.0
[[annotations]]
path = ["e2e/**"]
precedence = "aggregate"
SPDX-FileCopyrightText = "2026 Deutsche Telekom AG"
SPDX-License-Identifier = "Apache-2.0"

# e2etests - Apache-2.0
[[annotations]]
path = ["e2etests/**"]
precedence = "aggregate"
SPDX-FileCopyrightText = "2026 Deutsche Telekom AG"
SPDX-License-Identifier = "Apache-2.0"

# BPF kernel code - GPL-2.0-only (kernel BPF requires GPL)
[[annotations]]
path = ["bpf/**/*.c", "bpf/**/*.h"]
precedence = "override"
SPDX-FileCopyrightText = "2026 Deutsche Telekom AG"
SPDX-License-Identifier = "GPL-2.0-only"

# Root LICENSE file - Apache-2.0
[[annotations]]
path = ["LICENSE"]
precedence = "override"
SPDX-FileCopyrightText = "2020 Deutsche Telekom AG"
SPDX-License-Identifier = "Apache-2.0"

# BPF bundled license text (verbatim GPL-2.0 copy)
[[annotations]]
path = ["bpf/LICENSE"]
precedence = "override"
SPDX-FileCopyrightText = "Free Software Foundation, Inc."
SPDX-License-Identifier = "GPL-2.0-only"
