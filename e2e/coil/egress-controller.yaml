# Coil Egress Controller — manages Egress CRs and creates egress gateway Deployments
---
apiVersion: v1
kind: Secret
metadata:
  labels:
    app.kubernetes.io/name: coil
  name: coilv2-egress-webhook-server-cert
  namespace: kube-system
type: Opaque
data: {}
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app.kubernetes.io/name: coil
  name: coilv2-egress-webhook-service
  namespace: kube-system
spec:
  ipFamilyPolicy: PreferDualStack
  ipFamilies:
    - IPv4
    - IPv6
  ports:
    - port: 443
      protocol: TCP
      targetPort: 9444
  selector:
    app.kubernetes.io/component: coil-egress-controller
    app.kubernetes.io/name: coil
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/component: coil-egress-controller
    app.kubernetes.io/name: coil
  name: coil-egress-controller
  namespace: kube-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: coil-egress-controller
      app.kubernetes.io/name: coil
  template:
    metadata:
      labels:
        app.kubernetes.io/component: coil-egress-controller
        app.kubernetes.io/name: coil
    spec:
      containers:
        - name: coil-egress-controller
          image: ghcr.io/cybozu-go/coil:2.14.2
          command: [coil-egress-controller]
          args:
            - --zap-stacktrace-level=panic
            - --enable-cert-rotation=true
            - --backend=nftables
          env:
            - name: COIL_POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: COIL_POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          ports:
            - containerPort: 9396
              name: metrics
              protocol: TCP
            - containerPort: 9397
              name: health
              protocol: TCP
            - containerPort: 9444
              name: webhook-server
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
          resources:
            requests:
              cpu: 100m
              memory: 200Mi
          volumeMounts:
            - mountPath: /certs
              name: cert
              readOnly: true
      # hostNetwork required: IPv6 pod→service routing not available in
      # Kind with Calico BGP (no node-to-node mesh). Controller needs
      # direct access to API server.
      hostNetwork: true
      priorityClassName: system-cluster-critical
      securityContext:
        runAsGroup: 10000
        runAsUser: 10000
      serviceAccountName: coil-egress-controller
      terminationGracePeriodSeconds: 10
      tolerations:
        - effect: NoSchedule
          key: node-role.kubernetes.io/master
        - effect: NoSchedule
          key: node-role.kubernetes.io/control-plane
        - effect: NoSchedule
          key: node.kubernetes.io/not-ready
      volumes:
        - name: cert
          secret:
            defaultMode: 420
            secretName: coilv2-egress-webhook-server-cert
---
# Egress webhooks
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  labels:
    app.kubernetes.io/name: coil
  name: coilv2-mutating-egress-webhook-configuration
webhooks:
  - admissionReviewVersions: [v1, v1beta1]
    clientConfig:
      service:
        name: coilv2-egress-webhook-service
        namespace: kube-system
        path: /mutate-coil-cybozu-com-v2-egress
    failurePolicy: Fail
    name: megress.kb.io
    rules:
      - apiGroups: [coil.cybozu.com]
        apiVersions: [v2]
        operations: [CREATE]
        resources: [egresses]
    sideEffects: None
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  labels:
    app.kubernetes.io/name: coil
  name: coilv2-validating-egress-webhook-configuration
webhooks:
  - admissionReviewVersions: [v1, v1beta1]
    clientConfig:
      service:
        name: coilv2-egress-webhook-service
        namespace: kube-system
        path: /validate-coil-cybozu-com-v2-egress
    failurePolicy: Fail
    name: vegress.kb.io
    rules:
      - apiGroups: [coil.cybozu.com]
        apiVersions: [v2]
        operations: [CREATE, UPDATE]
        resources: [egresses]
    sideEffects: None
