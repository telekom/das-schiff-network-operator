# Coil Egress CRD (egress-only mode — no AddressPool/AddressBlock/BlockRequest CRDs)
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.16.4
  labels:
    app.kubernetes.io/name: coil
  name: egresses.coil.cybozu.com
spec:
  group: coil.cybozu.com
  names:
    kind: Egress
    listKind: EgressList
    plural: egresses
    singular: egress
  scope: Namespaced
  versions:
    - name: v2
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          description: Egress is the Schema for the egresses API
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              description: EgressSpec defines the desired state of Egress
              properties:
                destinations:
                  description: Destinations is a list of IP networks in CIDR format.
                  items:
                    type: string
                  minItems: 1
                  type: array
                fouSourcePortAuto:
                  description: Whether the source port number in FoU should be chosen automatically.
                  type: boolean
                podDisruptionBudget:
                  description: Optional PodDisruptionBudget for Egress NAT pods.
                  properties:
                    maxUnavailable:
                      anyOf:
                        - type: integer
                        - type: string
                      x-kubernetes-int-or-string: true
                    minAvailable:
                      anyOf:
                        - type: integer
                        - type: string
                      x-kubernetes-int-or-string: true
                  type: object
                replicas:
                  default: 1
                  description: Replicas is the desired number of egress (SNAT) pods.
                  format: int32
                  minimum: 1
                  type: integer
                sessionAffinity:
                  default: ClientIP
                  enum:
                    - ClientIP
                    - None
                  type: string
                sessionAffinityConfig:
                  properties:
                    clientIP:
                      properties:
                        timeoutSeconds:
                          format: int32
                          type: integer
                      type: object
                  type: object
                strategy:
                  properties:
                    rollingUpdate:
                      properties:
                        maxSurge:
                          anyOf:
                            - type: integer
                            - type: string
                          x-kubernetes-int-or-string: true
                        maxUnavailable:
                          anyOf:
                            - type: integer
                            - type: string
                          x-kubernetes-int-or-string: true
                      type: object
                    type:
                      type: string
                  type: object
                template:
                  type: object
              required:
                - destinations
              type: object
            status:
              properties:
                selector:
                  type: string
                replicas:
                  format: int32
                  type: integer
              type: object
          type: object
      subresources:
        status: {}
