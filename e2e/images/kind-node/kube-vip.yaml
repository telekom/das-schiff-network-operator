# kube-vip static pod manifest template.
# VIP address is injected by deploy-kube-vip.sh at setup time.
# Matches vm-lab: BGP mode, peers with CRA FRR via hbn veth.
apiVersion: v1
kind: Pod
metadata:
  name: kube-vip
  namespace: kube-system
spec:
  containers:
    - name: kube-vip
      image: ghcr.io/kube-vip/kube-vip:v0.9.0
      imagePullPolicy: IfNotPresent
      args:
        - manager
      env:
        - name: vip_arp
          value: "false"
        - name: vip_address
          value: "__VIP_ADDRESS__"
        - name: vip_subnet
          value: "32"
        - name: vip_interface
          value: "lo"
        - name: port
          value: "6443"
        - name: cp_enable
          value: "true"
        - name: cp_namespace
          value: "kube-system"
        - name: svc_enable
          value: "false"
        - name: vip_leaderelection
          value: "false"
        - name: vip_leaseduration
          value: "5"
        - name: vip_renewdeadline
          value: "3"
        - name: vip_retryperiod
          value: "1"
        - name: vip_loglevel
          value: "5"
        - name: vip_nodename
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        - name: bgp_enable
          value: "true"
        - name: bgp_as
          value: "65170"
        - name: bgp_peeras
          value: "65169"
        - name: mpbgp_ipv6
          value: "fd00:7:caa5::"
        - name: mpbgp_nexthop
          value: "fixed"
        - name: bgp_peers
          value: "[fd00:7:caa5::]:65169::false/mpbgp_nexthop=fixed"
        - name: bgp_sourceip
          value: "fd00:7:caa5::1"
        - name: bgp_routerid
          value: "169.254.1.1"
        - name: bgp_hold_time
          value: "3"
        - name: bgp_keepalive_interval
          value: "1"
        - name: prometheus_server
          value: ":2113"
      securityContext:
        capabilities:
          add:
            - NET_ADMIN
            - NET_RAW
          drop:
            - ALL
      volumeMounts:
        - mountPath: /etc/kubernetes/admin.conf
          name: kubeconfig
  hostAliases:
    - hostnames:
        - kubernetes
      ip: 127.0.0.1
  hostNetwork: true
  volumes:
    - name: kubeconfig
      hostPath:
        path: /etc/kubernetes/super-admin.conf
        type: FileOrCreate
