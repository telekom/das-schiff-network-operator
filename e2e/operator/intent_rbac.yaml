apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: intent-role
rules:
- apiGroups: ["network-connector.sylvaproject.org"]
  resources:
    - announcementpolicies
    - bgppeerings
    - collectors
    - destinations
    - inbounds
    - interfaceconfigs
    - layer2attachments
    - networks
    - outbounds
    - podnetworks
    - trafficmirrors
    - vrfs
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: ["network-connector.sylvaproject.org"]
  resources:
    - announcementpolicies/status
    - bgppeerings/status
    - collectors/status
    - destinations/status
    - inbounds/status
    - interfaceconfigs/status
    - layer2attachments/status
    - networks/status
    - outbounds/status
    - podnetworks/status
    - trafficmirrors/status
    - vrfs/status
  verbs: ["get", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: intent-rolebinding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: intent-role
subjects:
- kind: ServiceAccount
  name: controller-manager
  namespace: system
