# RBAC for the network-sync controller on the management cluster.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: network-sync
  namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: network-sync
rules:
# Watch CAPI Cluster objects
- apiGroups: ["cluster.x-k8s.io"]
  resources: ["clusters"]
  verbs: ["get", "list", "watch"]
# Read kubeconfig Secrets
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "list", "watch"]
# Watch + manage all intent CRD types (including finalizer updates)
- apiGroups: ["network-connector.sylvaproject.org"]
  resources:
  - vrfs
  - networks
  - destinations
  - layer2attachments
  - inbounds
  - outbounds
  - podnetworks
  - bgppeerings
  - collectors
  - trafficmirrors
  - announcementpolicies
  - interfaceconfigs
  - nodeattachments
  verbs: ["get", "list", "watch", "update", "patch"]
# Read intent CRD status (for IPAM promotion) and write it back (status
# sync-back mirrors workload Ready/Resolved conditions onto the mgmt objects,
# and marks resources when a namespace maps to multiple workload clusters).
- apiGroups: ["network-connector.sylvaproject.org"]
  resources:
  - vrfs/status
  - networks/status
  - destinations/status
  - layer2attachments/status
  - inbounds/status
  - outbounds/status
  - podnetworks/status
  - bgppeerings/status
  - collectors/status
  - trafficmirrors/status
  - announcementpolicies/status
  - interfaceconfigs/status
  - nodeattachments/status
  verbs: ["get", "update", "patch"]
# Emit events on intent resources (e.g. multiple-workload-cluster block)
- apiGroups: [""]
  resources: ["events"]
  verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: network-sync
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: network-sync
subjects:
- kind: ServiceAccount
  name: network-sync
  namespace: kube-system
