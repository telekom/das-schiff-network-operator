frr version 10.3.1_git
frr defaults datacenter
hostname dcgw1
log syslog informational
!
vrf vr.mgmt
 vni 20
exit-vrf
!
interface lo
 ip address 192.0.2.1/32
 ipv6 address fd00:2::1/128
exit
!
router bgp 64497
 bgp router-id 192.0.2.1
 bgp cluster-id 192.0.2.0
 neighbor EVPN peer-group
 neighbor EVPN remote-as internal
 neighbor eth-leaf1 interface remote-as 65500
 neighbor eth-leaf2 interface remote-as 65500
 bgp listen range 10.50.0.0/16 peer-group EVPN
 !
 address-family ipv4 unicast
  network 192.0.2.1/32
  no neighbor EVPN activate
 exit-address-family
 !
 ! IPv6 unicast underlay — advertise a routable loopback (used as the ping source
 ! towards routed VMs) and learn VM/pod /128s from the leaves.
 address-family ipv6 unicast
  network fd00:2::1/128
  neighbor eth-leaf1 activate
  neighbor eth-leaf2 activate
  no neighbor EVPN activate
 exit-address-family
 !
 address-family l2vpn evpn
  neighbor EVPN activate
  neighbor EVPN route-reflector-client
  advertise-all-vni
 exit-address-family
exit
!
router bgp 64497 vrf vr.mgmt
 bgp router-id 192.0.2.1
 bgp cluster-id 192.0.2.0
 !
 address-family ipv4 unicast
  redistribute kernel
  redistribute connected
  redistribute static
 exit-address-family
 !
 address-family ipv6 unicast
  redistribute kernel
  redistribute connected
  redistribute static
 exit-address-family
 !
 address-family l2vpn evpn
  advertise ipv4 unicast
  advertise ipv6 unicast
 exit-address-family
exit
!
