frr version 10.3.1_git
frr defaults datacenter
hostname dcgw2
log syslog informational
!
vrf vr.mgmt
 vni 20
exit-vrf
!
vrf vr.m2m
 vni 2002026
exit-vrf
!
vrf vr.c2m
 vni 2002027
exit-vrf
!
interface lo
 ip address 192.0.2.2/32
exit
!
router bgp 64497
 bgp router-id 192.0.2.2
 bgp cluster-id 192.0.2.0
 neighbor EVPN peer-group
 neighbor EVPN remote-as internal
 neighbor eth-leaf1 interface remote-as 65500
 neighbor eth-leaf2 interface remote-as 65500
 bgp listen range 10.50.0.0/16 peer-group EVPN
 !
 address-family ipv4 unicast
  network 192.0.2.2/32
  no neighbor EVPN activate
 exit-address-family
 !
 address-family l2vpn evpn
  neighbor EVPN activate
  neighbor EVPN route-reflector-client
  advertise-all-vni
 exit-address-family
exit
!
router bgp 64497 vrf vr.mgmt
 bgp router-id 192.0.2.2
 bgp cluster-id 192.0.2.0
 neighbor hostgw interface remote-as 64498
 !
 address-family ipv4 unicast
  redistribute kernel
  redistribute connected
  redistribute static
 exit-address-family
 !
 address-family ipv6 unicast
  redistribute kernel
  redistribute connected
  redistribute static
  neighbor hostgw activate
 exit-address-family
 !
 address-family l2vpn evpn
  advertise ipv4 unicast
  advertise ipv6 unicast
 exit-address-family
exit
!
router bgp 64497 vrf vr.m2m
 bgp router-id 192.0.2.2
 bgp cluster-id 192.0.2.0
 !
 address-family ipv4 unicast
  redistribute kernel
  redistribute connected
  redistribute static
 exit-address-family
 !
 address-family ipv6 unicast
  redistribute kernel
  redistribute connected
  redistribute static
 exit-address-family
 !
 address-family l2vpn evpn
  advertise ipv4 unicast
  advertise ipv6 unicast
  route-target import 65188:2026
  route-target export 65188:2026
 exit-address-family
exit
!
router bgp 64497 vrf vr.c2m
 bgp router-id 192.0.2.2
 bgp cluster-id 192.0.2.0
 !
 address-family ipv4 unicast
  redistribute kernel
  redistribute connected
  redistribute static
 exit-address-family
 !
 address-family ipv6 unicast
  redistribute kernel
  redistribute connected
  redistribute static
 exit-address-family
 !
 address-family l2vpn evpn
  advertise ipv4 unicast
  advertise ipv6 unicast
  route-target import 65188:2027
  route-target export 65188:2027
 exit-address-family
exit
!
