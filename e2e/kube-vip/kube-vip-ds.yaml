---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kube-vip
  namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: system:kube-vip-role
rules:
  - apiGroups: [""]
    resources: [services/status]
    verbs: [update]
  - apiGroups: [""]
    resources: [services, endpoints]
    verbs: [list, get, watch, update]
  - apiGroups: [""]
    resources: [nodes]
    verbs: [list, get, watch, update, patch]
  - apiGroups: [coordination.k8s.io]
    resources: [leases]
    verbs: [list, get, watch, update, create]
  - apiGroups: [discovery.k8s.io]
    resources: [endpointslices]
    verbs: [list, get, watch, update]
  - apiGroups: [""]
    resources: [pods]
    verbs: [list]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: system:kube-vip-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:kube-vip-role
subjects:
  - kind: ServiceAccount
    name: kube-vip
    namespace: kube-system
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  labels:
    app.kubernetes.io/name: kube-vip-ds
  name: kube-vip-ds
  namespace: kube-system
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: kube-vip-ds
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kube-vip-ds
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: node-role.kubernetes.io/control-plane
                    operator: DoesNotExist
      containers:
        - args:
            - manager
          env:
            - name: vip_arp
              value: "false"
            - name: vip_subnet
              value: "32,128"
            - name: vip_interface
              value: lo
            - name: vip_leaderelection
              value: "false"
            - name: svc_election
              value: "false"
            - name: svc_enable
              value: "true"
            - name: enable_endpointslices
              value: "true"
            - name: dns_mode
              value: dual
            - name: bgp_enable
              value: "true"
            - name: bgp_hold_time
              value: "3"
            - name: bgp_keepalive_interval
              value: "1"
            - name: bgp_as
              value: "65170"
            - name: bgp_peeras
              value: "65169"
            - name: bgp_peers
              value: "[fd00:7:caa5::]:65169::false/mpbgp_nexthop=fixed"
            - name: bgp_sourceip
              value: "fd00:7:caa5::1"
            - name: bgp_routerid
              value: "169.254.1.1"
            - name: mpbgp_ipv6
              value: "fd00:7:caa5::"
            - name: mpbgp_nexthop
              value: fixed
            - name: disable_service_updates
              value: "true"
            - name: vip_loglevel
              value: "5"
            - name: vip_nodename
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: prometheus_server
              value: ":2112"
          image: ghcr.io/kube-vip/kube-vip:v0.9.0
          imagePullPolicy: IfNotPresent
          name: kube-vip
          securityContext:
            capabilities:
              add:
                - NET_ADMIN
                - NET_RAW
              drop:
                - ALL
      hostNetwork: true
      serviceAccountName: kube-vip
