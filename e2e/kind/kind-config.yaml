# e2e/kind/kind-config.yaml
# Kind cluster configuration for das-schiff-network-operator e2e tests.
#
# Per-node CRA configs are pre-generated by generate-node-configs.sh
# and mounted via extraMounts so cra.service can pick them up.
# hostPaths use ${REPO_ROOT} — resolved by create-kind-cluster.sh via envsubst.
#
# Bootstrap uses Docker eth0 for API connectivity.
# setup-node-network.service (baked into image) adds loopback IPs from
# /etc/node-identity.env BEFORE kubelet starts, so --node-ip is valid.
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: nwop
networking:
  podSubnet: "fd10:244::/56,10.244.0.0/16"
  serviceSubnet: "fd10:96::/108,10.96.0.0/16"
  ipFamily: dual
  disableDefaultCNI: true
nodes:
  - role: control-plane
    extraMounts:
      - hostPath: ${REPO_ROOT}/e2e/generated/nwop-control-plane/cra
        containerPath: /etc/cra
      - hostPath: ${REPO_ROOT}/e2e/generated/nwop-control-plane/node-identity.env
        containerPath: /etc/node-identity.env
        readOnly: true
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-ip: "10.100.0.10"
      - |
        kind: ClusterConfiguration
        apiServer:
          certSANs:
            - "127.0.0.1"                   # kind port-forward (host kubectl)
            - "10.100.0.200"                # kube-vip VIP
            - "10.100.0.10"                 # control-plane overlay IP
  - role: worker
    extraMounts:
      - hostPath: ${REPO_ROOT}/e2e/generated/nwop-worker/cra
        containerPath: /etc/cra
      - hostPath: ${REPO_ROOT}/e2e/generated/nwop-worker/node-identity.env
        containerPath: /etc/node-identity.env
        readOnly: true
    kubeadmConfigPatches:
      - |
        kind: JoinConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-ip: "10.100.0.11"
  - role: worker
    extraMounts:
      - hostPath: ${REPO_ROOT}/e2e/generated/nwop-worker2/cra
        containerPath: /etc/cra
      - hostPath: ${REPO_ROOT}/e2e/generated/nwop-worker2/node-identity.env
        containerPath: /etc/node-identity.env
        readOnly: true
    kubeadmConfigPatches:
      - |
        kind: JoinConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-ip: "10.100.0.12"
