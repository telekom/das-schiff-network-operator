name: PR Labeler

# Note: We use pull_request_target instead of pull_request so that labels
# can be applied to pull requests from forks. This is safe because:
# - The labeler actions do NOT check out or execute untrusted PR code
# - All actions are pinned to specific commit SHAs
on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  ensure-labels:
    name: Ensure Labels Exist
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - name: Create missing labels
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          ensure_label() {
            local name="$1"
            local color="$2"
            local description="$3"
            if ! gh label view "$name" >/dev/null 2>&1; then
              gh label create "$name" --color "$color" --description "$description"
            fi
          }

          ensure_label "api" "ededed" "API changes"
          ensure_label "controller" "ededed" "Controller changes"
          ensure_label "documentation" "0075ca" "Improvements or additions to documentation"
          ensure_label "ci" "ededed" "CI/CD changes"
          ensure_label "tests" "ededed" "Test changes"
          ensure_label "dependencies" "ededed" "Dependency changes"
          ensure_label "config" "ededed" "Configuration changes"
          ensure_label "pkg" "ededed" "Package or networking changes"
          ensure_label "size/XS" "ededed" "Extra small PR"
          ensure_label "size/S" "ededed" "Small PR"
          ensure_label "size/M" "ededed" "Medium PR"
          ensure_label "size/L" "ededed" "Large PR"
          ensure_label "size/XL" "ededed" "Extra large PR"

  labeler:
    name: Add Labels to PR
    runs-on: ubuntu-latest
    needs: ensure-labels
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Add labels based on changed files
        uses: actions/labeler@634933edcd8ababfe52f92936142cc22ac488b1b # v6.0.1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          configuration-path: .github/labeler.yml

  size-label:
    name: Add Size Label
    runs-on: ubuntu-latest
    needs: ensure-labels
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Add size label
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          size=$(gh pr view "$PR_NUMBER" --json additions,deletions --jq '.additions + .deletions')
          if [ -z "$size" ]; then
            echo "Failed to determine PR size" >&2
            exit 1
          fi

          if [ "$size" -le 10 ]; then
            label="size/XS"
          elif [ "$size" -le 100 ]; then
            label="size/S"
          elif [ "$size" -le 500 ]; then
            label="size/M"
          elif [ "$size" -le 1000 ]; then
            label="size/L"
          else
            label="size/XL"
          fi

          for stale_label in "size/XS" "size/S" "size/M" "size/L" "size/XL"; do
            if [ "$stale_label" != "$label" ]; then
              gh pr edit "$PR_NUMBER" --remove-label "$stale_label" >/dev/null 2>&1 || true
            fi
          done
          gh pr edit "$PR_NUMBER" --add-label "$label"

          if [ "$label" = "size/XL" ]; then
            echo "This PR is quite large. Consider breaking it into smaller PRs for easier review." >> "$GITHUB_STEP_SUMMARY"
          fi
