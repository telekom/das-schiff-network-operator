name: E2E Tests

on:
  workflow_dispatch: {}
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "api/**"
      - "cmd/**"
      - "controllers/**"
      - "pkg/**"
      - "config/**"
      - "e2e/**"
      - "e2etests/**"
      - "go.mod"
      - "go.sum"
      - "bpf/**"
      - "*.Dockerfile"
      - "Makefile"

permissions: {}

concurrency:
  group: e2e-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6.2.0
        with:
          go-version-file: go.mod

      - name: Set up E2E lab
        run: make e2e-up

      - name: Run E2E tests
        run: make e2e-test

      - name: Collect debug logs
        if: failure()
        run: |
          mkdir -p /tmp/e2e-logs
          for node in nwop-control-plane nwop-worker nwop-worker2; do
            docker logs "$node" > "/tmp/e2e-logs/${node}-docker.log" 2>&1 || true
            docker exec "$node" journalctl -u cra.service --no-pager \
              > "/tmp/e2e-logs/${node}-cra.log" 2>&1 || true
            docker exec "$node" journalctl -u kubelet.service --no-pager \
              > "/tmp/e2e-logs/${node}-kubelet.log" 2>&1 || true
          done
          docker exec nwop-control-plane kubectl \
            --kubeconfig=/etc/kubernetes/admin.conf get pods -A -o wide \
            > /tmp/e2e-logs/pods.log 2>&1 || true
          docker exec nwop-control-plane kubectl \
            --kubeconfig=/etc/kubernetes/admin.conf get events -A \
            --sort-by='.lastTimestamp' > /tmp/e2e-logs/events.log 2>&1 || true
          docker exec clab-nwop-leaf1 vtysh -c 'show bgp summary' \
            > /tmp/e2e-logs/leaf1-bgp.log 2>&1 || true
          docker exec clab-nwop-leaf1 vtysh -c 'show bgp l2vpn evpn' \
            > /tmp/e2e-logs/leaf1-evpn.log 2>&1 || true

      - name: Upload debug logs
        if: failure()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: e2e-debug-logs
          path: /tmp/e2e-logs/
          retention-days: 7

      - name: Tear down E2E lab
        if: always()
        run: make e2e-down
