name: E2E Tests

on:
  workflow_dispatch: {}
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "api/**"
      - "cmd/**"
      - "controllers/**"
      - "pkg/**"
      - "config/**"
      - "e2e/**"
      - "e2etests/**"
      - "go.mod"
      - "go.sum"
      - "bpf/**"
      - "*.Dockerfile"
      - "Makefile"

permissions: {}

concurrency:
  group: e2e-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

env:
  IMG_BASE: ghcr.io/telekom
  KIND_NODE_VERSION: v1.35.1

jobs:
  # ── Parallel image builds ───────────────────────────────────────────
  build-kind-node:
    name: Build kind-node image
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Compute ldflags
        id: ldflags
        run: echo "value=$(bash hack/version.sh)" >> "$GITHUB_OUTPUT"

      - name: Build cra-frr image
        run: |
          docker build \
            --build-arg ldflags="${{ steps.ldflags.outputs.value }}" \
            -f das-schiff-cra-frr.Dockerfile \
            -t das-schiff-cra-frr:latest .

      - name: Build kind-node image (with cra-frr baked in)
        run: |
          docker save -o e2e/images/kind-node/cra-frr.tar das-schiff-cra-frr:latest
          docker build \
            --build-arg KIND_NODE_VERSION=${{ env.KIND_NODE_VERSION }} \
            -t ${{ env.IMG_BASE }}/das-schiff-kind-node:${{ env.KIND_NODE_VERSION }} \
            -f e2e/images/kind-node/Dockerfile \
            e2e/images/kind-node/
          rm -f e2e/images/kind-node/cra-frr.tar

      - name: Export kind-node tarball
        run: |
          mkdir -p /tmp/e2e-images
          docker save -o /tmp/e2e-images/kind-node.tar \
            "${{ env.IMG_BASE }}/das-schiff-kind-node:${{ env.KIND_NODE_VERSION }}"

      - name: Upload kind-node image
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: e2e-image-kind-node
          path: /tmp/e2e-images/kind-node.tar
          retention-days: 1
          compression-level: 0 # already compressed by docker save

  build-e2e-images:
    name: Build ${{ matrix.image }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        image:
          - das-schiff-network-operator
          - das-schiff-nwop-agent-cra-frr
          - das-schiff-nwop-agent-netplan
          - das-schiff-platform-coil
          - das-schiff-platform-metallb
          - das-schiff-network-sync
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Compute ldflags
        id: ldflags
        run: echo "value=$(bash hack/version.sh)" >> "$GITHUB_OUTPUT"

      - name: Build image
        run: |
          docker build \
            --build-arg ldflags="${{ steps.ldflags.outputs.value }}" \
            -f ${{ matrix.image }}.Dockerfile \
            -t ${{ env.IMG_BASE }}/${{ matrix.image }}:latest .

      - name: Export tarball
        run: |
          mkdir -p /tmp/e2e-images
          docker save -o /tmp/e2e-images/${{ matrix.image }}.tar \
            "${{ env.IMG_BASE }}/${{ matrix.image }}:latest"

      - name: Upload image
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: e2e-image-${{ matrix.image }}
          path: /tmp/e2e-images/${{ matrix.image }}.tar
          retention-days: 1
          compression-level: 0

  build-infra-images:
    name: Build infra images (nat64 + tester)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Build nat64 image
        run: |
          docker build \
            -t ${{ env.IMG_BASE }}/das-schiff-nat64:latest \
            -f e2e/images/nat64/Dockerfile \
            e2e/images/nat64/

      - name: Build tester image
        run: |
          docker build \
            -t ${{ env.IMG_BASE }}/das-schiff-e2e-tester:latest \
            -f e2e/images/tester/Dockerfile \
            e2e/images/tester/

      - name: Export tarballs
        run: |
          mkdir -p /tmp/e2e-images
          docker save -o /tmp/e2e-images/das-schiff-nat64.tar \
            "${{ env.IMG_BASE }}/das-schiff-nat64:latest"
          docker save -o /tmp/e2e-images/das-schiff-e2e-tester.tar \
            "${{ env.IMG_BASE }}/das-schiff-e2e-tester:latest"

      - name: Upload infra images
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: e2e-image-infra
          path: /tmp/e2e-images/*.tar
          retention-days: 1
          compression-level: 0

  # ── E2E setup + test (uses pre-built images) ────────────────────────
  e2e:
    name: E2E Tests
    needs: [build-kind-node, build-e2e-images, build-infra-images]
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: system-level-dependencies
        run: |
          sudo apt update
          sudo apt -y install linux-modules-extra-$(uname -r)

      - name: Download all E2E images
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: /tmp/e2e-images
          pattern: e2e-image-*
          merge-multiple: true

      - name: Set up E2E lab
        env:
          E2E_SKIP_BUILD: "true"
          E2E_IMAGE_DIR: /tmp/e2e-images
          E2E_NODE_IMAGE: ${{ env.IMG_BASE }}/das-schiff-kind-node:${{ env.KIND_NODE_VERSION }}
        run: make e2e-up

      - name: Run E2E tests (legacy)
        id: legacy
        run: make e2e-test

      - name: Run E2E tests (intent)
        if: ${{ !cancelled() && steps.legacy.conclusion != 'skipped' }}
        id: intent
        run: make e2e-test-intent

      - name: Run E2E tests (mirror)
        if: ${{ !cancelled() && steps.intent.conclusion != 'skipped' }}
        run: make e2e-test-mirror

      - name: Collect debug logs
        if: failure()
        run: |
          mkdir -p /tmp/e2e-logs
          for node in nwop-control-plane nwop-worker nwop-worker2 nwop2-worker; do
            docker logs "$node" > "/tmp/e2e-logs/${node}-docker.log" 2>&1 || true
            docker exec "$node" journalctl -u cra.service --no-pager \
              > "/tmp/e2e-logs/${node}-cra.log" 2>&1 || true
            docker exec "$node" journalctl -u kubelet.service --no-pager \
              > "/tmp/e2e-logs/${node}-kubelet.log" 2>&1 || true
          done
          # Cluster-1 state
          docker exec nwop-control-plane kubectl \
            --kubeconfig=/etc/kubernetes/admin.conf get pods -A -o wide \
            > /tmp/e2e-logs/pods.log 2>&1 || true
          docker exec nwop-control-plane kubectl \
            --kubeconfig=/etc/kubernetes/admin.conf get events -A \
            --sort-by='.lastTimestamp' > /tmp/e2e-logs/events.log 2>&1 || true
          # Cluster-1 operator logs (current + previous crashed container)
          docker exec nwop-control-plane bash -c \
            'POD=$(kubectl --kubeconfig=/etc/kubernetes/admin.conf -n kube-system \
              get pods -l app.kubernetes.io/name=network-operator -o name | head -1); \
             [ -n "$POD" ] && kubectl --kubeconfig=/etc/kubernetes/admin.conf \
              -n kube-system logs "$POD" --all-containers' \
            > /tmp/e2e-logs/operator-logs.log 2>&1 || true
          docker exec nwop-control-plane bash -c \
            'POD=$(kubectl --kubeconfig=/etc/kubernetes/admin.conf -n kube-system \
              get pods -l app.kubernetes.io/name=network-operator -o name | head -1); \
             [ -n "$POD" ] && kubectl --kubeconfig=/etc/kubernetes/admin.conf \
              -n kube-system logs "$POD" --all-containers --previous' \
            > /tmp/e2e-logs/operator-logs-previous.log 2>&1 || true
          docker exec nwop-control-plane bash -c \
            'POD=$(kubectl --kubeconfig=/etc/kubernetes/admin.conf -n kube-system \
              get pods -l app.kubernetes.io/name=network-operator -o name | head -1); \
             [ -n "$POD" ] && kubectl --kubeconfig=/etc/kubernetes/admin.conf \
              -n kube-system describe "$POD"' \
            > /tmp/e2e-logs/operator-describe.log 2>&1 || true
          # Platform controller logs (cluster-1)
          for ctrl_label in platform-coil platform-metallb; do
            docker exec nwop-control-plane bash -c \
              "POD=\$(kubectl --kubeconfig=/etc/kubernetes/admin.conf -n kube-system \
                get pods -l app.kubernetes.io/name=${ctrl_label} -o name | head -1); \
               [ -n \"\$POD\" ] && kubectl --kubeconfig=/etc/kubernetes/admin.conf \
                -n kube-system logs \"\$POD\" --all-containers" \
              > "/tmp/e2e-logs/${ctrl_label}-logs.log" 2>&1 || true
          done
          # Network-sync controller logs (cluster-1)
          docker exec nwop-control-plane bash -c \
            'POD=$(kubectl --kubeconfig=/etc/kubernetes/admin.conf -n kube-system \
              get pods -l app.kubernetes.io/name=network-sync -o name | head -1); \
             [ -n "$POD" ] && kubectl --kubeconfig=/etc/kubernetes/admin.conf \
              -n kube-system logs "$POD" --all-containers' \
            > /tmp/e2e-logs/network-sync-logs.log 2>&1 || true
          # Cluster-2 state
          docker exec nwop2-worker kubectl \
            --kubeconfig=/etc/kubernetes/admin.conf get pods -A -o wide \
            > /tmp/e2e-logs/cluster2-pods.log 2>&1 || true
          docker exec nwop2-worker kubectl \
            --kubeconfig=/etc/kubernetes/admin.conf get events -A \
            --sort-by='.lastTimestamp' > /tmp/e2e-logs/cluster2-events.log 2>&1 || true
          # Cluster-2 operator logs (current + previous crashed container)
          docker exec nwop2-worker bash -c \
            'POD=$(kubectl --kubeconfig=/etc/kubernetes/admin.conf -n kube-system \
              get pods -l app.kubernetes.io/name=network-operator -o name | head -1); \
             [ -n "$POD" ] && kubectl --kubeconfig=/etc/kubernetes/admin.conf \
              -n kube-system logs "$POD" --all-containers' \
            > /tmp/e2e-logs/cluster2-operator-logs.log 2>&1 || true
          docker exec nwop2-worker bash -c \
            'POD=$(kubectl --kubeconfig=/etc/kubernetes/admin.conf -n kube-system \
              get pods -l app.kubernetes.io/name=network-operator -o name | head -1); \
             [ -n "$POD" ] && kubectl --kubeconfig=/etc/kubernetes/admin.conf \
              -n kube-system logs "$POD" --all-containers --previous' \
            > /tmp/e2e-logs/cluster2-operator-logs-previous.log 2>&1 || true
          docker exec nwop2-worker bash -c \
            'POD=$(kubectl --kubeconfig=/etc/kubernetes/admin.conf -n kube-system \
              get pods -l app.kubernetes.io/name=network-operator -o name | head -1); \
             [ -n "$POD" ] && kubectl --kubeconfig=/etc/kubernetes/admin.conf \
              -n kube-system describe "$POD"' \
            > /tmp/e2e-logs/cluster2-operator-describe.log 2>&1 || true
          # Intent CRD state (both clusters)
          for crd in vrfs networks destinations layer2attachments inbounds outbounds \
                     bgppeerings collectors trafficmirrors nodenetworkconfigs \
                     interfaceconfigs nodenetworkstatuses nodenetplanconfigs \
                     podnetworks announcementpolicies; do
            docker exec nwop-control-plane kubectl \
              --kubeconfig=/etc/kubernetes/admin.conf get "$crd" -A -o yaml \
              > "/tmp/e2e-logs/intent-${crd}.yaml" 2>&1 || true
            docker exec nwop2-worker kubectl \
              --kubeconfig=/etc/kubernetes/admin.conf get "$crd" -A -o yaml \
              > "/tmp/e2e-logs/cluster2-intent-${crd}.yaml" 2>&1 || true
          done
          # Platform-managed resources (Coil Egress, Calico IPPool, NetworkPolicies)
          docker exec nwop-control-plane kubectl \
            --kubeconfig=/etc/kubernetes/admin.conf get egresses.coil.cybozu.com -A -o yaml \
            > /tmp/e2e-logs/coil-egresses.yaml 2>&1 || true
          docker exec nwop-control-plane kubectl \
            --kubeconfig=/etc/kubernetes/admin.conf get ippools.crd.projectcalico.org -o yaml \
            > /tmp/e2e-logs/calico-ippools.yaml 2>&1 || true
          docker exec nwop-control-plane kubectl \
            --kubeconfig=/etc/kubernetes/admin.conf get networkpolicies -A -o yaml \
            > /tmp/e2e-logs/networkpolicies.yaml 2>&1 || true
          for rtr in leaf1 leaf2 dcgw1 dcgw2; do
            docker exec "clab-nwop-${rtr}" vtysh -c 'show bgp summary' \
              > "/tmp/e2e-logs/${rtr}-bgp.log" 2>&1 || true
          done
          for dcgw in dcgw1 dcgw2; do
            docker exec "clab-nwop-${dcgw}" vtysh -c 'show bgp l2vpn evpn' \
              > "/tmp/e2e-logs/${dcgw}-evpn.log" 2>&1 || true
            docker exec "clab-nwop-${dcgw}" vtysh -c 'show evpn vni' \
              > "/tmp/e2e-logs/${dcgw}-vni.log" 2>&1 || true
            docker exec "clab-nwop-${dcgw}" ip route show table all \
              > "/tmp/e2e-logs/${dcgw}-ip-routes.log" 2>&1 || true
            docker exec "clab-nwop-${dcgw}" ip -6 route show table all \
              > "/tmp/e2e-logs/${dcgw}-ip6-routes.log" 2>&1 || true
          done
          # Enable BPF stats to see program run counts
          docker exec nwop-control-plane sysctl -w kernel.bpf_stats_enabled=1 2>/dev/null || true
          sleep 2
          for node in nwop-control-plane nwop-worker nwop-worker2 nwop2-worker; do
            docker exec "$node" bash -c \
              'P=$(systemctl show cra.service -p MainPID --value 2>/dev/null); \
               CRA_PID=$(cat /proc/$P/task/*/children 2>/dev/null | head -1 | tr -d " \n"); \
               [ -n "$CRA_PID" ] && nsenter -t $CRA_PID -m -n -- vtysh -c "show bgp l2vpn evpn"' \
              > "/tmp/e2e-logs/${node}-cra-evpn.log" 2>&1 || true
            docker exec "$node" bash -c \
              'P=$(systemctl show cra.service -p MainPID --value 2>/dev/null); \
               CRA_PID=$(cat /proc/$P/task/*/children 2>/dev/null | head -1 | tr -d " \n"); \
               [ -n "$CRA_PID" ] && nsenter -t $CRA_PID -m -n -- ip -6 route show table all' \
              > "/tmp/e2e-logs/${node}-cra-ip6-routes.log" 2>&1 || true
            docker exec "$node" bash -c \
              'P=$(systemctl show cra.service -p MainPID --value 2>/dev/null); \
               CRA_PID=$(cat /proc/$P/task/*/children 2>/dev/null | head -1 | tr -d " \n"); \
               [ -n "$CRA_PID" ] && nsenter -t $CRA_PID -m -- journalctl -u frr-cra.service --no-pager' \
              > "/tmp/e2e-logs/${node}-cra-frr-cra.log" 2>&1 || true
            docker exec "$node" bash -c \
              'P=$(systemctl show cra.service -p MainPID --value 2>/dev/null); \
               CRA_PID=$(cat /proc/$P/task/*/children 2>/dev/null | head -1 | tr -d " \n"); \
               [ -n "$CRA_PID" ] && nsenter -t $CRA_PID -m -n -- ip link show' \
              > "/tmp/e2e-logs/${node}-cra-links.log" 2>&1 || true
            docker exec "$node" bash -c \
              'P=$(systemctl show cra.service -p MainPID --value 2>/dev/null); \
               CRA_PID=$(cat /proc/$P/task/*/children 2>/dev/null | head -1 | tr -d " \n"); \
               [ -n "$CRA_PID" ] && nsenter -t $CRA_PID -m -n -- ip neigh show' \
              > "/tmp/e2e-logs/${node}-cra-neigh.log" 2>&1 || true
            docker exec "$node" bash -c \
              'P=$(systemctl show cra.service -p MainPID --value 2>/dev/null); \
               CRA_PID=$(cat /proc/$P/task/*/children 2>/dev/null | head -1 | tr -d " \n"); \
               [ -n "$CRA_PID" ] && nsenter -t $CRA_PID -m -n -- bridge fdb show' \
              > "/tmp/e2e-logs/${node}-cra-fdb.log" 2>&1 || true
            docker exec "$node" bash -c \
              'P=$(systemctl show cra.service -p MainPID --value 2>/dev/null); \
               CRA_PID=$(cat /proc/$P/task/*/children 2>/dev/null | head -1 | tr -d " \n"); \
               if [ -n "$CRA_PID" ]; then \
                 echo "=== bpftool link show (global) ===" ; \
                 bpftool link show 2>&1 ; \
                 echo "=== bpftool link show (CRA netns) ===" ; \
                 nsenter -t $CRA_PID -n -- bpftool link show 2>&1 ; \
                 echo "=== tc filter on VLAN interfaces ===" ; \
                 for dev in $(nsenter -t $CRA_PID -n -- ip -o link show | grep "vlan\\." | awk -F: "{print \$2}" | tr -d " "); do \
                   echo "--- $dev ---" ; \
                   nsenter -t $CRA_PID -n -- tc filter show dev "$dev" ingress 2>&1 ; \
                 done ; \
                 echo "=== bpftool net ===" ; \
                 nsenter -t $CRA_PID -n -- bpftool net show 2>&1 ; \
                 echo "=== bpftool prog ===" ; \
                 bpftool prog show 2>&1 ; \
                 echo "=== CRA frr-cra service status ===" ; \
                 nsenter -t $CRA_PID -m -- systemctl status frr-cra.service --no-pager 2>&1 ; \
               fi' \
              > "/tmp/e2e-logs/${node}-cra-bpf.log" 2>&1 || true
          done

      - name: Upload debug logs
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: e2e-debug-logs
          path: /tmp/e2e-logs/
          retention-days: 7

      - name: Tear down E2E lab
        if: always()
        run: make e2e-down
