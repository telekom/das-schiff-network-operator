name: Check Tool Updates

on:
  schedule:
    # Run weekly on Wednesday at 8:00 UTC
    - cron: '0 8 * * 3'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  check-updates:
    name: Check for Tool Updates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Load versions.env
        id: versions
        run: |
          if [ ! -f versions.env ]; then
            echo "versions.env not found, skipping"
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          get_version() {
            local val
            val=$(grep -E "^${1}=" versions.env | head -1 | sed 's/^[^=]*=//')
            if [ -z "$val" ]; then
              echo "::warning::Key ${1} not found or empty in versions.env"
              return 1
            fi
            echo "$val"
          }
          echo "skip=false" >> $GITHUB_OUTPUT
          echo "kustomize=$(get_version KUSTOMIZE_VERSION)" >> $GITHUB_OUTPUT
          echo "controller_tools=$(get_version CONTROLLER_TOOLS_VERSION)" >> $GITHUB_OUTPUT
          echo "golangci_lint=$(get_version GOLANGCI_LINT_VERSION)" >> $GITHUB_OUTPUT

      - name: Check for updates
        if: steps.versions.outputs.skip != 'true'
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          check_github_release() {
            local repo=$1
            local current=$2
            local name=$3
            if [ -z "$current" ]; then
              echo "  - **${name}**: skipped (version not found in versions.env)" >> updates.md
              check_failed=true
              return
            fi
            local latest
            latest=$(gh api "repos/${repo}/releases/latest" --jq '.tag_name') || { check_failed=true; return; }
            # Strip tool-name prefix for monorepo tags (e.g., "kustomize/v5.8.0" → "v5.8.0")
            latest="${latest##*/}"
            if [ "$latest" != "$current" ]; then
              echo "  - **${name}**: ${current} → ${latest} ([releases](https://github.com/${repo}/releases))" >> updates.md
              found_any=true
            fi
          }

          found_any=false
          check_failed=false

          check_github_release "kubernetes-sigs/kustomize" "${{ steps.versions.outputs.kustomize }}" "kustomize"
          check_github_release "kubernetes-sigs/controller-tools" "${{ steps.versions.outputs.controller_tools }}" "controller-tools"
          check_github_release "golangci/golangci-lint" "${{ steps.versions.outputs.golangci_lint }}" "golangci-lint"

          if [ "$found_any" = "true" ]; then
            echo "found=true" >> $GITHUB_OUTPUT
            # Prepend header to updates.md
            {
              echo "## Tool Update Report"
              echo ""
              echo "The following tools have newer versions available:"
              echo ""
              cat updates.md
              echo ""
              echo "---"
              echo "To update, edit \`versions.env\` and run \`make generate manifests\` to verify compatibility."
            } > updates-final.md
            mv updates-final.md updates.md
            cat updates.md
          fi
          if [ "$check_failed" = "true" ]; then
            echo "check_failed=true" >> $GITHUB_OUTPUT
          fi

      - name: Create or update issue
        if: steps.versions.outputs.skip != 'true' && steps.check.outputs.found == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ISSUE_TITLE="🔧 Tool Updates Available"
          EXISTING_ISSUE=$(gh issue list --label "dependencies" --label "automation" --state open --search "in:title $ISSUE_TITLE" --json number --jq '.[0].number // empty' || echo "")
          if [ -n "$EXISTING_ISSUE" ]; then
            gh issue edit "$EXISTING_ISSUE" --body-file updates.md
            echo "Updated issue #${EXISTING_ISSUE}"
          else
            gh issue create \
              --title "$ISSUE_TITLE" \
              --body-file updates.md \
              --label "dependencies" \
              --label "automation"
            echo "Created new issue"
          fi

      - name: Summary
        run: |
          echo "### Tool Update Check Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.versions.outputs.skip }}" = "true" ]; then
            echo "Tool update check was skipped (versions.env not found)." >> $GITHUB_STEP_SUMMARY
          elif [ -f updates.md ]; then
            cat updates.md >> $GITHUB_STEP_SUMMARY
          else
            echo "All tools are up to date!" >> $GITHUB_STEP_SUMMARY
          fi
          if [ "${{ steps.check.outputs.check_failed }}" = "true" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "> [!WARNING]" >> $GITHUB_STEP_SUMMARY
            echo "> One or more GitHub API calls failed; results may be incomplete." >> $GITHUB_STEP_SUMMARY
          fi
