version: 2
updates:
- package-ecosystem: "github-actions"
  directory: "/"
  schedule:
    interval: "daily"
  commit-message:
    prefix: ":seedling:"
  labels:
    - "ok-to-test"
  groups:
    actions-major:
      patterns:
        - "*"
      update-types:
        - "major"
    actions-minor-patch:
      patterns:
        - "*"
      update-types:
        - "minor"
        - "patch"

- package-ecosystem: "gomod"
  directory: "/"
  schedule:
    interval: "daily"
  commit-message:
    prefix: ":seedling:"
  labels:
    - "ok-to-test"
  ignore:
    - dependency-name: "k8s.io/*"
      # The code still imports Kubernetes APIs removed in newer minor lines.
      update-types:
        - "version-update:semver-major"
        - "version-update:semver-minor"
    - dependency-name: "sigs.k8s.io/controller-runtime"
      # Keep controller-runtime on the Kubernetes minor line used by the repo.
      update-types:
        - "version-update:semver-major"
        - "version-update:semver-minor"
  groups:
    kubernetes-major:
      patterns:
        - "k8s.io/*"
        - "sigs.k8s.io/*"
        - "go.etcd.io/*"
        - "google.golang.org/grpc"
      update-types:
        - "major"
    kubernetes-minor-patch:
      patterns:
        - "k8s.io/*"
        - "sigs.k8s.io/*"
        - "go.etcd.io/*"
        - "google.golang.org/grpc"
      update-types:
        - "minor"
        - "patch"
    go-major:
      patterns:
        - "*"
      exclude-patterns:
        - "k8s.io/*"
        - "sigs.k8s.io/*"
        - "go.etcd.io/*"
        - "google.golang.org/grpc"
      update-types:
        - "major"
    go-minor-patch:
      patterns:
        - "*"
      exclude-patterns:
        - "k8s.io/*"
        - "sigs.k8s.io/*"
        - "go.etcd.io/*"
        - "google.golang.org/grpc"
      update-types:
        - "minor"
        - "patch"
  open-pull-requests-limit: 10

- package-ecosystem: "docker"
  directory: "/"
  schedule:
    interval: "daily"
  commit-message:
    prefix: ":seedling:"
  labels:
    - "ok-to-test"
  groups:
    docker-major:
      patterns:
        - "*"
      update-types:
        - "major"
    docker-minor-patch:
      patterns:
        - "*"
      update-types:
        - "minor"
        - "patch"
