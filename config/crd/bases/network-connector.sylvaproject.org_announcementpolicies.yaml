  names:
    kind: AnnouncementPolicy
    listKind: AnnouncementPolicyList
    plural: announcementpolicies
    shortNames:
    - ap
    singular: announcementpolicy
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.vrfRef
      name: VRFRef
      type: string
    - jsonPath: .spec.aggregate.enabled
      name: Aggregate
      type: boolean
    - jsonPath: .status.matchedUsageCRDs
      name: Matched
      type: integer
    - jsonPath: .status.conditions[?(@.type=="Ready")].status
      name: Ready
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: networkconnector
    schema:
      openAPIV3Schema:
        description: |-
          AnnouncementPolicy controls how routes are exported into a VRF: communities
          on host routes and whether to also export an aggregate covering prefix.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              AnnouncementPolicySpec defines the desired state of AnnouncementPolicy.
              Host routes (/32, /128) are always exported — the DC fabric needs them as
              more-specifics. This policy controls communities on host routes and whether
              to also export an aggregate covering prefix.
            properties:
              aggregate:
                description: |-
                  Aggregate configures the aggregate (covering prefix) route.
                  Default: enabled with auto-computed prefix from allocated IPs.
                properties:
                  communities:
                    description: Communities attached to the aggregate route.
                    items:
                      type: string
                    type: array
                  enabled:
                    default: true
                    description: |-
                      Enabled controls whether an aggregate route is exported alongside host routes.
                      Default: true (auto-computed covering prefix from allocated IPs).
                      Set to false to export only host routes.
                    type: boolean
                  prefixLengthV4:
                    description: |-
                      PrefixLengthV4 overrides the auto-computed IPv4 aggregate size.
                      Must be between the Network CIDR prefix length and 32.
                      If omitted, controller auto-computes the smallest covering prefix.
                    format: int32
                    maximum: 32
                    minimum: 1
                    type: integer
                  prefixLengthV6:
                    description: |-
                      PrefixLengthV6 overrides the auto-computed IPv6 aggregate size.
                      Must be between the Network CIDR prefix length and 128.
                      If omitted, controller auto-computes the smallest covering prefix.
                    format: int32
                    maximum: 128
                    minimum: 1
                    type: integer
                type: object
              hostRoutes:
                description: |-
                  HostRoutes configures communities for host routes (/32, /128).
                  Host routes are always exported; this controls their community tags.
                properties:
                  communities:
                    description: Communities lists BGP community strings to attach
                      to these routes.
                    items:
                      type: string
                    type: array
                type: object
              selector:
                description: |-
                  Selector matches usage CRDs (Inbound, Outbound, Layer2Attachment, PodNetwork)
                  by label. The policy applies to exports from matched usage CRDs into the
                  specified VRF. If omitted, applies to ALL usage CRDs exporting into this VRF.
                properties:
                  matchExpressions:
                    description: matchExpressions is a list of label selector requirements.
                      The requirements are ANDed.
                    items:
                      description: |-
                        A label selector requirement is a selector that contains values, a key, and an operator that
                        relates the key and values.
                      properties:
                        key:
                          description: key is the label key that the selector applies
                            to.
                          type: string
                        operator:
                          description: |-
                            operator represents a key's relationship to a set of values.
                            Valid operators are In, NotIn, Exists and DoesNotExist.
                          type: string
                        values:
                          description: |-
                            values is an array of string values. If the operator is In or NotIn,
                            the values array must be non-empty. If the operator is Exists or DoesNotExist,
                            the values array must be empty. This array is replaced during a strategic
                            merge patch.
                          items:
                            type: string
                          type: array
                          x-kubernetes-list-type: atomic
                      required:
                      - key
                      - operator
                      type: object
                    type: array
                    x-kubernetes-list-type: atomic
                  matchLabels:
                    additionalProperties:
                      type: string
                    description: |-
                      matchLabels is a map of {key,value} pairs. A single {key,value} in the matchLabels
                      map is equivalent to an element of matchExpressions, whose key field is "key", the
                      operator is "In", and the values array contains only "value". The requirements are ANDed.
                    type: object
                type: object
                x-kubernetes-map-type: atomic
              vrfRef:
                description: VRFRef is the VRF this policy governs exports into. Required.
                minLength: 1
                type: string
            required:
            - vrfRef
            type: object
          status:
            description: AnnouncementPolicyStatus defines the observed state of AnnouncementPolicy.
            properties:
              conditions:
                description: Conditions represent the latest available observations
                  of the resource's state.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              matchedUsageCRDs:
                description: MatchedUsageCRDs is the number of usage CRDs matched
                  by the selector.
                format: int32
                type: integer
              observedGeneration:
                description: ObservedGeneration is the most recent generation observed
                  by the controller.
                format: int64
                type: integer
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
