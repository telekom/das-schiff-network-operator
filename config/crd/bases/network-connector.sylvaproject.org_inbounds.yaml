  names:
    kind: Inbound
    listKind: InboundList
    plural: inbounds
    shortNames:
    - ib
    singular: inbound
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.networkRef
      name: NetworkRef
      type: string
    - jsonPath: .spec.count
      name: Count
      type: integer
    - jsonPath: .status.poolName
      name: Pool
      type: string
    - jsonPath: .spec.advertisement.type
      name: Advertisement
      type: string
    - jsonPath: .status.conditions[?(@.type=="Ready")].status
      name: Ready
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Inbound allocates IPs from a Network for MetalLB pools and BGP/L2
          advertisement.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              InboundSpec defines the desired state of Inbound.
              Allocates IPs from a Network for MetalLB pools and BGP/L2 advertisement.
              Optionally exports IPs as host routes into VRFs (HBN mode).
            properties:
              addresses:
                description: Addresses specifies explicit address allocations. Mutually
                  exclusive with Count.
                properties:
                  ipv4:
                    description: IPv4 lists allocated IPv4 addresses.
                    items:
                      type: string
                    type: array
                  ipv6:
                    description: IPv6 lists allocated IPv6 addresses.
                    items:
                      type: string
                    type: array
                type: object
              advertisement:
                description: Advertisement configures the MetalLB advertisement mode
                  (bgp or l2).
                properties:
                  type:
                    description: Type is the advertisement mode.
                    enum:
                    - bgp
                    - l2
                    type: string
                required:
                - type
                type: object
              count:
                description: Count is the number of IPs to allocate. Mutually exclusive
                  with Addresses.
                format: int32
                minimum: 1
                type: integer
              destinations:
                description: Destinations selects Destination CRDs. If omitted, non-HBN
                  mode is used.
                properties:
                  matchExpressions:
                    description: matchExpressions is a list of label selector requirements.
                      The requirements are ANDed.
                    items:
                      description: |-
                        A label selector requirement is a selector that contains values, a key, and an operator that
                        relates the key and values.
                      properties:
                        key:
                          description: key is the label key that the selector applies
                            to.
                          type: string
                        operator:
                          description: |-
                            operator represents a key's relationship to a set of values.
                            Valid operators are In, NotIn, Exists and DoesNotExist.
                          type: string
                        values:
                          description: |-
                            values is an array of string values. If the operator is In or NotIn,
                            the values array must be non-empty. If the operator is Exists or DoesNotExist,
                            the values array must be empty. This array is replaced during a strategic
                            merge patch.
                          items:
                            type: string
                          type: array
                          x-kubernetes-list-type: atomic
                      required:
                      - key
                      - operator
                      type: object
                    type: array
                    x-kubernetes-list-type: atomic
                  matchLabels:
                    additionalProperties:
                      type: string
                    description: |-
                      matchLabels is a map of {key,value} pairs. A single {key,value} in the matchLabels
                      map is equivalent to an element of matchExpressions, whose key field is "key", the
                      operator is "In", and the values array contains only "value". The requirements are ANDed.
                    type: object
                type: object
                x-kubernetes-map-type: atomic
              networkRef:
                description: NetworkRef references a Network CRD by name.
                minLength: 1
                type: string
              poolName:
                description: PoolName overrides the MetalLB IPAddressPool name.
                type: string
              tenantLoadBalancerClass:
                description: TenantLoadBalancerClass specifies the LoadBalancerClass
                  for tenant-managed LB.
