---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.0
  name: bgppeerings.network-connector.sylvaproject.org
spec:
  group: network-connector.sylvaproject.org
  names:
    kind: BGPPeering
    listKind: BGPPeeringList
    plural: bgppeerings
    shortNames:
    - bgpp
    singular: bgppeering
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.mode
      name: Mode
      type: string
    - jsonPath: .spec.workloadAS
      name: WorkloadAS
      type: integer
    - jsonPath: .spec.enableBFD
      name: BFD
      type: boolean
    - jsonPath: .status.conditions[?(@.type=="Ready")].status
      name: Ready
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: networkconnector
    schema:
      openAPIV3Schema:
        description: |-
          BGPPeering is the Schema for the bgppeerings API.
          It defines a BGP session — either for an L2 attachment (listenRange mode)
          or for tenant BGPaaS (loopbackPeer mode with auto-generated ULA addresses).
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: BGPPeeringSpec defines the desired state of BGPPeering.
            properties:
              addressFamilies:
                description: |-
                  AddressFamilies specifies which BGP address families to negotiate.
                  If omitted, defaults to dual-stack (both IPv4 and IPv6 unicast).
                items:
                  description: BGPAddressFamily specifies a BGP address family for
                    session negotiation.
                  enum:
                  - ipv4Unicast
                  - ipv6Unicast
                  type: string
                minItems: 1
                type: array
              advertiseTransferNetwork:
                description: |-
                  AdvertiseTransferNetwork controls whether the transfer network prefix
                  is advertised to the BGP peer.
                type: boolean
              authSecretRef:
                description: |-
                  AuthSecretRef references a Secret containing the BGP session password (key: "password").
                  The controller reads the Secret and propagates the password to nodes via
                  NodeNetworkConfig — node agents never need direct Secret RBAC.
                properties:
                  name:
                    default: ""
                    description: |-
                      Name of the referent.
                      This field is effectively required, but due to backwards compatibility is
                      allowed to be empty. Instances of this type with an empty value here are
                      almost certainly wrong.
                      More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                    type: string
                type: object
                x-kubernetes-map-type: atomic
              bfdProfile:
                description: BFDProfile configures BFD timer parameters. Only relevant
                  when EnableBFD is true.
                properties:
                  minInterval:
                    description: MinInterval is the minimum interval for BFD packets
                      in milliseconds.
                    format: int32
                    maximum: 60000
                    minimum: 50
                    type: integer
                required:
                - minInterval
                type: object
              enableBFD:
                description: |-
                  EnableBFD enables Bidirectional Forwarding Detection for fast link-failure
                  detection on this BGP session.
                type: boolean
              holdTime:
                description: HoldTime is the BGP hold timer duration.
                type: string
              keepaliveTime:
                description: KeepaliveTime is the BGP keepalive timer duration.
                type: string
              maximumPrefixes:
                description: MaximumPrefixes limits the number of prefixes accepted
                  from the peer.
                format: int32
                minimum: 1
                type: integer
              mode:
                description: |-
                  Mode selects the peering type: listenRange (L2 attachment BGP) or loopbackPeer (BGPaaS).
                  Immutable after creation.
                enum:
                - listenRange
                - loopbackPeer
                type: string
              ref:
                description: Ref identifies what this peering session is for.
                properties:
                  attachmentRef:
                    description: |-
                      AttachmentRef references a Layer2Attachment by name.
                      Used with listenRange mode — the BGP session peers with workloads on this L2 segment.
                    type: string
                  inboundRefs:
                    description: |-
                      InboundRefs references Inbound resources whose IP pools are advertised.
                      Used with loopbackPeer mode — the tenant workload advertises VIPs from these pools.
                    items:
                      type: string
                    minItems: 1
                    type: array
                type: object
                x-kubernetes-validations:
                - message: exactly one of attachmentRef or inboundRefs must be set
                  rule: (has(self.attachmentRef) && !has(self.inboundRefs)) || (!has(self.attachmentRef)
                    && has(self.inboundRefs))
              workloadAS:
                description: |-
                  WorkloadAS is the autonomous system number for the workload/tenant side.
                  Uses asplain notation; for 4-byte ASNs use the full 32-bit integer.
                  When omitted, the controller auto-generates a deterministic ASN.
                format: int64
                maximum: 4294967295
                minimum: 1
                type: integer
            required:
            - mode
            - ref
            type: object
            x-kubernetes-validations:
            - message: mode is immutable
              rule: self.mode == oldSelf.mode
          status:
            description: BGPPeeringStatus defines the observed state of BGPPeering.
            properties:
              asNumber:
                description: ASNumber is the autonomous system number of the platform
                  side (observed).
                format: int64
                type: integer
              conditions:
                description: |-
                  Conditions represent the latest available observations of the
                  BGPPeering's current state.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              neighborASNumber:
                description: NeighborASNumber is the AS number of the remote peer
                  (observed).
                format: int64
                type: integer
              neighborIPs:
                description: |-
                  NeighborIPs lists the IP addresses used for the BGP session.
                  For loopbackPeer: auto-generated ULA IPv6 addresses.
                  For listenRange: derived from the L2 attachment's transfer network.
                  For SR-IOV with VTEP_NODE: route reflector IPs from infrastructure provisioning.
                items:
                  type: string
                type: array
              observedGeneration:
                description: ObservedGeneration is the most recent generation observed
                  by the controller.
                format: int64
                type: integer
              workloadASNumber:
                description: WorkloadASNumber is the AS number assigned to the workload
                  (observed/auto-generated).
                format: int64
                type: integer
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
