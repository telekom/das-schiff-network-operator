---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.0
  name: layer2attachments.network-connector.sylvaproject.org
spec:
  group: network-connector.sylvaproject.org
  names:
    kind: Layer2Attachment
    listKind: Layer2AttachmentList
    plural: layer2attachments
    shortNames:
    - l2a
    singular: layer2attachment
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.networkRef
      name: NetworkRef
      type: string
    - jsonPath: .spec.interfaceName
      name: InterfaceName
      type: string
    - jsonPath: .spec.mtu
      name: MTU
      type: integer
    - jsonPath: .spec.sriov.enabled
      name: SRIOV
      type: boolean
    - jsonPath: .status.conditions[?(@.type=="Ready")].status
      name: Ready
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          Layer2Attachment attaches a Network as a Layer 2 segment to a set of nodes.
          Supports HBN mode (VXLAN + VRF) and non-HBN mode (physical interface).
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: Layer2AttachmentSpec defines the desired state of Layer2Attachment.
            properties:
              destinations:
                description: |-
                  Destinations selects Destination resources by label.
                  If omitted, no VRF plumbing is performed.
                properties:
                  matchExpressions:
                    description: matchExpressions is a list of label selector requirements.
                      The requirements are ANDed.
                    items:
                      description: |-
                        A label selector requirement is a selector that contains values, a key, and an operator that
                        relates the key and values.
                      properties:
                        key:
                          description: key is the label key that the selector applies
                            to.
                          type: string
                        operator:
                          description: |-
                            operator represents a key's relationship to a set of values.
                            Valid operators are In, NotIn, Exists and DoesNotExist.
                          type: string
                        values:
                          description: |-
                            values is an array of string values. If the operator is In or NotIn,
                            the values array must be non-empty. If the operator is Exists or DoesNotExist,
                            the values array must be empty. This array is replaced during a strategic
                            merge patch.
                          items:
                            type: string
                          type: array
                          x-kubernetes-list-type: atomic
                      required:
                      - key
                      - operator
                      type: object
                    type: array
                    x-kubernetes-list-type: atomic
                  matchLabels:
                    additionalProperties:
                      type: string
                    description: |-
                      matchLabels is a map of {key,value} pairs. A single {key,value} in the matchLabels
                      map is equivalent to an element of matchExpressions, whose key field is "key", the
                      operator is "In", and the values array contains only "value". The requirements are ANDed.
                    type: object
                type: object
                x-kubernetes-map-type: atomic
              disableAnycast:
                description: DisableAnycast disables the anycast gateway.
                type: boolean
              disableNeighborSuppression:
                description: DisableNeighborSuppression disables neighbor suppression.
                type: boolean
              disableSegmentation:
                description: DisableSegmentation disables TX/RX segmentation offload
                  on the interface.
                type: boolean
              interfaceName:
                description: InterfaceName is the interface name suffix. Immutable
                  once set.
                type: string
              interfaceRef:
                description: |-
                  InterfaceRef points to an existing host interface for non-HBN mode.
                  On bare metal: the agent creates a VLAN sub-interface on this NIC/bond.
                  On VMs: the hypervisor provides the NIC; the agent creates a VLAN sub-interface on it.
                  If nil (HBN mode), a VXLAN interface is created automatically.
                type: string
              mtu:
                description: MTU is the interface MTU.
                format: int32
                maximum: 9000
                minimum: 1000
                type: integer
              networkRef:
                description: NetworkRef references a Network CRD by name.
                minLength: 1
                type: string
              nodeIPs:
                description: NodeIPs is the node IP assignment configuration.
                properties:
                  enabled:
                    description: Enabled controls whether node IPs are assigned from
                      the referenced Network.
                    type: boolean
                  reservedRanges:
                    description: |-
                      ReservedRanges lists IP ranges (CIDRs) within the Network that are reserved
                      for pod use and must not be allocated to nodes. Each entry must be a valid
                      CIDR that falls within the parent Network's address space.
                    items:
                      type: string
                    type: array
                required:
                - enabled
                type: object
              nodeSelector:
                description: NodeSelector selects which nodes receive this attachment.
                properties:
                  matchExpressions:
                    description: matchExpressions is a list of label selector requirements.
                      The requirements are ANDed.
                    items:
                      description: |-
                        A label selector requirement is a selector that contains values, a key, and an operator that
                        relates the key and values.
                      properties:
                        key:
                          description: key is the label key that the selector applies
                            to.
                          type: string
                        operator:
                          description: |-
                            operator represents a key's relationship to a set of values.
                            Valid operators are In, NotIn, Exists and DoesNotExist.
                          type: string
                        values:
                          description: |-
                            values is an array of string values. If the operator is In or NotIn,
                            the values array must be non-empty. If the operator is Exists or DoesNotExist,
                            the values array must be empty. This array is replaced during a strategic
                            merge patch.
                          items:
                            type: string
                          type: array
                          x-kubernetes-list-type: atomic
                      required:
                      - key
                      - operator
                      type: object
                    type: array
                    x-kubernetes-list-type: atomic
                  matchLabels:
                    additionalProperties:
                      type: string
                    description: |-
                      matchLabels is a map of {key,value} pairs. A single {key,value} in the matchLabels
                      map is equivalent to an element of matchExpressions, whose key field is "key", the
                      operator is "In", and the values array contains only "value". The requirements are ANDed.
                    type: object
                type: object
                x-kubernetes-map-type: atomic
              sriov:
                description: |-
                  SRIOV is the SR-IOV configuration. When set, the CRA agent skips
                  VXLAN/VLAN bridge setup and configures VF passthrough instead.
                properties:
                  enabled:
                    description: Enabled controls whether SR-IOV is active. Immutable
                      once set.
                    type: boolean
                required:
                - enabled
                type: object
            required:
            - networkRef
            type: object
            x-kubernetes-validations:
            - message: networkRef is immutable
              rule: self.networkRef == oldSelf.networkRef
            - message: interfaceName is immutable
              rule: '!has(oldSelf.interfaceName) || self.interfaceName == oldSelf.interfaceName'
            - message: sriov.enabled is immutable
              rule: '!has(oldSelf.sriov) || !has(self.sriov) || self.sriov.enabled
                == oldSelf.sriov.enabled'
          status:
            description: Layer2AttachmentStatus defines the observed state of Layer2Attachment.
            properties:
              anycast:
                description: Anycast holds anycast gateway information.
                properties:
                  gateways:
                    description: Gateways lists the anycast gateway addresses (IPv4
                      and/or IPv6).
                    items:
                      type: string
                    type: array
                  mac:
                    description: MAC is the anycast gateway MAC address.
                    type: string
                required:
                - mac
                type: object
              conditions:
                description: Conditions represent the latest available observations
                  of the resource's state.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              nodeAddresses:
                additionalProperties:
                  description: AddressAllocation holds allocated IP addresses in status.
                  properties:
                    ipv4:
                      description: IPv4 lists allocated IPv4 addresses.
                      items:
                        type: string
                      type: array
                    ipv6:
                      description: IPv6 lists allocated IPv6 addresses.
                      items:
                        type: string
                      type: array
                  type: object
                description: |-
                  NodeAddresses holds per-node IP addresses allocated when nodeIPs.enabled is true.
                  Key is node name, value contains the allocated addresses.
                type: object
              observedGeneration:
                description: ObservedGeneration is the most recent generation observed
                  by the controller.
                format: int64
                type: integer
              sriovVlanID:
                description: SRIOVVlanID is the VLAN ID assigned for SR-IOV device
                  traffic.
                format: int32
                type: integer
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
