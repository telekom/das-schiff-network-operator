---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.0
  name: destinations.network-connector.sylvaproject.org
spec:
  group: network-connector.sylvaproject.org
  names:
    kind: Destination
    listKind: DestinationList
    plural: destinations
    shortNames:
    - dst
    singular: destination
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.vrfRef
      name: VRFRef
      type: string
    - jsonPath: .status.referenceCount
      name: RefCount
      type: integer
    - jsonPath: .status.conditions[?(@.type=="Ready")].status
      name: Ready
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Destination is the Schema for the destinations API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: DestinationSpec defines the desired state of Destination.
            properties:
              nextHop:
                description: Next-hop addresses for static routing. Mutually exclusive
                  with vrfRef.
                properties:
                  ipv4:
                    description: IPv4 is the IPv4 next-hop address (e.g. "198.51.100.1").
                    type: string
                  ipv6:
                    description: IPv6 is the IPv6 next-hop address (e.g. "2001:db8:100::1").
                    type: string
                type: object
                x-kubernetes-validations:
                - message: at least one of ipv4 or ipv6 must be set
                  rule: has(self.ipv4) || has(self.ipv6)
              ports:
                description: Port restrictions for egress NetworkPolicy.
                items:
                  description: |-
                    DestinationPort describes a port (or port range) allowed for traffic
                    to a Destination's prefixes. Mirrors K8s NetworkPolicy port semantics.
                    Exactly one of Port or PortRange must be set per entry.
                  properties:
                    port:
                      description: |-
                        Port is a single port number (1–65535).
                        Mutually exclusive with PortRange.
                      format: int32
                      maximum: 65535
                      minimum: 1
                      type: integer
                    portRange:
                      description: |-
                        PortRange specifies a contiguous range of ports.
                        Mutually exclusive with Port.
                      properties:
                        end:
                          description: End is the last port in the range (≥ Start,
                            1–65535).
                          format: int32
                          maximum: 65535
                          minimum: 1
                          type: integer
                        start:
                          description: Start is the first port in the range (1–65535).
                          format: int32
                          maximum: 65535
                          minimum: 1
                          type: integer
                      required:
                      - end
                      - start
                      type: object
                      x-kubernetes-validations:
                      - message: start must be <= end
                        rule: self.start <= self.end
                    protocol:
                      description: Protocol is the network protocol.
                      enum:
                      - TCP
                      - UDP
                      - SCTP
                      type: string
                  required:
                  - protocol
                  type: object
                  x-kubernetes-validations:
                  - message: exactly one of port or portRange must be set
                    rule: (has(self.port) && !has(self.portRange)) || (!has(self.port)
                      && has(self.portRange))
                type: array
              prefixes:
                description: Subnets reachable via this destination (CIDR notation).
                items:
                  type: string
                type: array
              vrfRef:
                description: References a VRF resource by name. Mutually exclusive
                  with nextHop.
                type: string
            type: object
            x-kubernetes-validations:
            - message: exactly one of vrfRef or nextHop must be set
              rule: (has(self.vrfRef) && !has(self.nextHop)) || (!has(self.vrfRef)
                && has(self.nextHop))
          status:
            description: DestinationStatus defines the observed state of Destination.
            properties:
              conditions:
                description: Standard Kubernetes conditions.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              observedGeneration:
                description: ObservedGeneration is the most recent generation observed
                  by the controller.
                format: int64
                type: integer
              referenceCount:
                description: How many attachments/connections reference this destination.
                format: int32
                type: integer
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
