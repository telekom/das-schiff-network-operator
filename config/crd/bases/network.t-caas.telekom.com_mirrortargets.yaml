    controller-gen.kubebuilder.io/version: v0.20.0
  name: mirrortargets.network.t-caas.telekom.com
spec:
  group: network.t-caas.telekom.com
  names:
    kind: MirrorTarget
    listKind: MirrorTargetList
    plural: mirrortargets
    shortNames:
    - mirrortarget
    singular: mirrortarget
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.type
      name: Type
      type: string
    - jsonPath: .spec.destinationIP
      name: Destination
      type: string
    - jsonPath: .spec.destinationVrf
      name: VRF
      type: string
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          MirrorTarget is the Schema for the mirrortargets API. It describes where
          mirrored traffic is sent (a remote GRE-encapsulated collector).
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              MirrorTargetSpec defines where mirrored traffic is sent. It describes the GRE
              tunnel properties and which VRF and loopback the tunnel source binds to. The
              per-node source IP is allocated from the referenced loopback's subnet on the
              VRFRouteConfiguration.
            properties:
              destinationIP:
                description: DestinationIP is the remote collector IP the tunnel points
                  to.
                pattern: ^((([0-9]{1,3}\.){3}[0-9]{1,3})|(([0-9a-fA-F]{0,4}:){2,7}[0-9a-fA-F]{0,4}))$
                type: string
              destinationVrf:
                description: |-
                  DestinationVrf is the VRF in which the GRE tunnel lives. It must be a
                  user-created VRFRouteConfiguration (with VNI + route-target). It may be a
                  readable name; the controller reduces it to a datapath-safe form.
                maxLength: 63
                type: string
              key:
                description: TunnelKey is an optional GRE encapsulation key.
                format: int32
                type: integer
              sourceLoopback:
                description: |-
                  SourceLoopback is the name of the loopback (defined on the destination
                  VRF's VRFRouteConfiguration) whose per-node allocated IP is used as the
                  GRE tunnel source address.
                type: string
              type:
                description: Type is the GRE encapsulation type of the tunnel.
                enum:
                - l2gre
                - l3gre
                type: string
            required:
            - destinationIP
            - destinationVrf
            - sourceLoopback
            - type
            type: object
          status:
            description: MirrorTargetStatus defines the observed state of MirrorTarget.
            properties:
              activeNodes:
                description: ActiveNodes is the number of nodes where the tunnel is
                  configured.
                type: integer
              activeSelectors:
                description: ActiveSelectors is the number of MirrorSelectors that
                  reference this target.
                type: integer
              conditions:
                description: Conditions represent the latest available observations
                  of the target state.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
