              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: InterfaceConfigSpec defines the desired state of InterfaceConfig.
            properties:
              bonds:
                additionalProperties:
                  description: BondConfig defines configuration for a bond interface.
                  properties:
                    interfaces:
                      description: Interfaces lists member ethernet interfaces.
                      items:
                        type: string
                      minItems: 1
                      type: array
                    mtu:
                      description: Mtu is the maximum transmission unit.
                      format: int32
                      maximum: 9000
                      minimum: 1000
                      type: integer
                    parameters:
                      description: Parameters are the bonding driver parameters.
                      properties:
                        downDelay:
                          description: DownDelay is the delay before disabling a failed
