apiVersion: v1
kind: ServiceAccount
metadata:
  name: platform-coil
  namespace: system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: platform-coil-role
rules:
- apiGroups:
  - network-connector.sylvaproject.org
  resources:
  - outbounds
  - outbounds/status
  - outbounds/finalizers
  - destinations
  verbs:
  - get
  - list
  - watch
  - update
  - patch
- apiGroups:
  - coil.cybozu.com
  resources:
  - egresses
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
  - delete
- apiGroups:
  - crd.projectcalico.org
  resources:
  - ippools
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
  - delete
- apiGroups:
  - ""
  resources:
  - nodes
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - network.t-caas.telekom.com
  resources:
  - nodenetworkconfigs
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - ""
  resources:
  - events
  verbs:
  - create
  - patch
- apiGroups:
  - coordination.k8s.io
  resources:
  - leases
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
  - delete
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: platform-coil-rolebinding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: platform-coil-role
subjects:
- kind: ServiceAccount
  name: platform-coil
  namespace: system
